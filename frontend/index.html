<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Baseline Content Security Policy (issue #34).
        - script-src 'self': no inline/eval scripts. Vite production build emits external scripts only.
        - style-src 'self' 'unsafe-inline': Shiki injects inline <style> for per-token color tokens;
          Tailwind v4 inlines reset styles. Both require 'unsafe-inline' to render.
        - img-src 'self' data:: lucide-react and shadcn use data: URIs for inline SVG icons.
        - font-src 'self' data:: WOFF2 fonts are bundled, plus base64 fallbacks.
        - connect-src 'self' ws: wss:: live-reload WebSocket on same origin (both schemes for tailnet/TLS deploys).
        - object-src 'none': no <object>/<embed> plugin content.
        - base-uri 'self': lock <base> so injected base tags can't redirect resource loads.
    -->
    <!--
      manifest-src and worker-src are intentionally omitted: both fall back to
      default-src 'self', and the manifest + service worker (issue #142) are
      served same-origin, so no CSP extension is required.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; object-src 'none'; base-uri 'self'" />

    <!-- PWA: web app manifest (Android/Chrome install) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Browser chrome / installed-app accent. Matches manifest theme_color. -->
    <meta name="theme-color" content="#8852e0" />

    <!-- Favicons: SVG for modern browsers, .ico fallback. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />

    <!-- iOS Safari "Add to Home Screen" — iOS ignores the manifest for these. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VibeDocs" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>VibeDocs</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
